<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تجربة أزرار الواتساب - نظام الصالون</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; gap: 20px; padding-top: 50px; background-color: #f4f7f6; }
        button { padding: 15px 25px; font-size: 16px; cursor: pointer; border: none; border-radius: 8px; color: white; width: 300px; transition: 0.3s; }
        
        /* ألوان الأزرار */
        .btn-simple { background-color: #25D366; } /* أخضر واتساب */
        .btn-encoded { background-color: #128C7E; } /* أخضر داكن */
        .btn-js { background-color: #34b7f1; }      /* أزرق */
        .btn-styled { background-color: #000; border: 2px solid #c5a059; color: #c5a059; font-weight: bold; } /* ذهبي وأسود للبرستيج */
        
        button:hover { opacity: 0.8; transform: scale(1.02); }
        .label { font-size: 14px; color: #666; margin-bottom: -15px; }
    </style>
</head>
<body>

    <h2>تجربة أزرار إرسال الواتساب 📲</h2>

    <div class="label">1. رابط بسيط (نص واضح - قد لا يدعم الإيموجي في بعض المتصفحات)</div>
    <a href="https://wa.me/966556308737?text=أهلا نورة، نذكرك بموعدك اليوم" target="_blank">
        <button class="btn-simple">إرسال نص واضح</button>
    </a>

    <div class="label">2. رابط مشفر (الأكثر استقراراً ويدعم الإيموجي)</div>
    <a href="https://wa.me/966556308737?text=%D8%A3%D9%87%D9%84%D8%A7%D9%8B%20%D9%86%D9%88%D8%B1%D8%A9%20%F0%9F%8C%B8%D8%8C%20%D9%86%D8%B0%D9%83%D8%B1%D9%83%20%D8%A8%D9%85%D9%88%D8%B9%D8%AF%D9%83%20%E2%9C%A8" target="_blank">
        <button class="btn-encoded">إرسال نص مشفر (آمن)</button>
    </a>

    <div class="label">3. عن طريق JavaScript (تجهيز النص برمجياً)</div>
    <button class="btn-js" onclick="sendWhatsApp()">إرسال عبر JS (دالة برمجية)</button>

    <div class="label">4. زر بستايل VIP (مناسب لهوية نظامك)</div>
    <button class="btn-styled" onclick="sendWhatsApp()">تذكير زبونة VIP ✨</button>

    <script>
        function sendWhatsApp() {
            const phone = "966556308737";
            const name = "نورة";
            const service = "ميك أب";
            const time = "5:00 مساءً";
            
            // النص الذي تراه وتعدله بسهولة
            const message = `أهلاً ${name} 🌸، نذكرك بموعدك لـ (${service}) اليوم الساعة ${time} في صالوننا. بانتظار إطلالتك ✨`;
            
            // التشفير التلقائي لضمان عمل الرابط في كل الأجهزة
            const encodedMsg = encodeURIComponent(message);
            const url = `https://api.whatsapp.com/send?phone=${phone}&text=${encodedMsg}`;
            
            // فتح الرابط في نافذة جديدة
            window.open(url, '_blank');
        }
    </script>

</body>
</html>
